<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>KRS Hub</title>
  <style>
    :root { --bg:#1e293b; --fg:#f1f5f9; --accent:#f97316; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display:flex; align-items:center; justify-content:center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      text-align:center;
    }
    .card { max-width: 340px; padding: 24px; }
    h1 { font-size: 20px; margin: 16px 0 8px; }
    p { font-size: 15px; line-height: 1.5; opacity: .85; margin: 0 0 20px; }
    button {
      background: var(--accent); color:#fff; border:0; border-radius: 12px;
      padding: 14px 22px; font-size: 16px; font-weight: 600; min-height: 48px;
      min-width: 180px;
    }
    .logo { width: 84px; height: 84px; border-radius: 20px; }
    .spin { display:none; }
  </style>
</head>
<body>
  <!--
    Bundled Fallback-Shell. Wird nur angezeigt, wenn die Live-PWA
    (server.url in capacitor.config.ts) beim Start nicht erreichbar ist.
    Im Normalbetrieb ersetzt Capacitor diese Seite sofort durch den
    Remote-Content des Hubs.
  -->
  <div class="card">
    <img class="logo" src="icon-512.png" alt="KRS Hub" />
    <h1>Keine Verbindung</h1>
    <p>KRS Hub braucht eine Internetverbindung. Bitte pruefe WLAN und versuche es erneut.</p>
    <button onclick="location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
